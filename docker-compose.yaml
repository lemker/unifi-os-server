version: "2.1"

volumes:
  unifi-persistent: {}
  unifi-var-log: {}
  unifi-data: {}
  unifi-srv: {}
  unifi-var-lib-unifi: {}
  unifi-var-lib-mongodb: {}
  unifi-etc-rabbitmq-ssl: {}

services:
  unifi-os-server:
    image: ghcr.io/lemker/unifi-os-server:latest
    container_name: unifi-os-server
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    tmpfs:
      - /run:exec
      - /run/lock
      - /tmp:exec
      - /var/lib/journal
      - /var/opt/unifi/tmp:size=64m
    environment:
      - UOS_SYSTEM_IP=192.168.18.18
    volumes:
      - unifi-persistent:/persistent
      - unifi-var-log:/var/log
      - unifi-data:/data
      - unifi-srv:/srv
      - unifi-var-lib-unifi:/var/lib/unifi
      - unifi-var-lib-mongodb:/var/lib/mongodb
      - unifi-etc-rabbitmq-ssl:/etc/rabbitmq/ssl
    labels:
      - io.balena.features.kernel-modules=1
    ports:
      - 80:443
      - 8080:8080
      - 3478:3478/udp
      - 10003:10003/udp
    restart: unless-stopped

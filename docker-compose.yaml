version: "2.1"

volumes:
  unifi: {}

services:
  unifi-os-server:
    image: ghcr.io/lemker/unifi-os-server:latest
    container_name: unifi-os-server
    cgroup: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    tmpfs:
      - /run:exec
      - /run/lock
      - /tmp:exec
      - /var/lib/journal
      - /var/opt/unifi/tmp:size=64m
    environment:
      - UOS_SYSTEM_IP=192.168.18.18
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - unifi:/
    labels:
      - io.balena.features.kernel-modules=1
    ports:
      - 11443:443
      - 8080:8080
      - 3478:3478/udp
      - 10003:10003/udp
    restart: unless-stopped

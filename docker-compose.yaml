version: "2.1"

services:
  mongo:
    image: mongo:4.4.18
    restart: always
    volumes:
      - db:/data/db
      - dbcfg:/data/configdb

  controller:
    image: jacobalberty/unifi:v7.3
    depends_on:
      - mongo
    network_mode: host
    restart: always

    volumes:
      - data:/unifi/data
      - log:/unifi/log
      - run:/var/run/unifi

    environment:
      - DB_URI=mongodb://localhost:27017/unifi
      - STATDB_URI=mongodb://localhost:27017/unifi_stat
      - DB_NAME=unifi
      - JVM_MAX_HEAP_SIZE=256M
      - JVM_INIT_HEAP_SIZE=128M

    labels:
      - io.balena.features.kernel-modules=1

volumes:
  db:
  dbcfg:
  data:
  log:
  run:
